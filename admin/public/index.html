<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMM-TaskList Admin</title>
<style>
	body {
		font-family: -apple-system, Helvetica, Arial, sans-serif;
		max-width: 720px;
		margin: 40px auto;
		padding: 0 20px;
		color: #222;
	}
	h1 { font-size: 1.4em; }
	h2 { font-size: 1.1em; margin-top: 2em; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
	.user-block {
		border: 1px solid #ddd;
		border-radius: 6px;
		padding: 12px 16px;
		margin-bottom: 14px;
	}
	.user-header {
		display: flex;
		justify-content: space-between;
		align-items: center;
	}
	.user-header h3 { margin: 0; }
	.task-list { list-style: none; padding: 0; margin: 10px 0 0; }
	.task-list li {
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 6px 0;
		border-top: 1px solid #eee;
	}
	form.inline { display: flex; gap: 8px; margin-top: 10px; }
	input[type=text] { flex: 1; padding: 6px 8px; }
	button { cursor: pointer; padding: 6px 10px; }
	button.danger { background: #fdd; border: 1px solid #c99; }
	button.complete { background: #dfd; border: 1px solid #9c9; }
	.muted { color: #888; font-size: 0.9em; }
</style>
</head>
<body>

<h1>MMM-TaskList Admin</h1>
<p class="muted">Manage household members and their assigned tasks.</p>

<h2>Add household member</h2>
<form id="add-user-form" class="inline">
	<input type="text" id="new-user-name" placeholder="Name" required>
	<button type="submit">Add</button>
</form>

<h2>Members &amp; Tasks</h2>
<div id="users-container"></div>

<script>
async function api(path, options) {
	const res = await fetch(path, Object.assign({
		headers: { "Content-Type": "application/json" }
	}, options));
	if (!res.ok) {
		const body = await res.json().catch(() => ({}));
		throw new Error(body.error || res.statusText);
	}
	return res.json();
}

async function loadState() {
	const state = await api("/api/state");
	render(state);
}

function render(state) {
	const container = document.getElementById("users-container");
	container.innerHTML = "";

	if (state.users.length === 0) {
		container.innerHTML = '<p class="muted">No household members yet. Add one above.</p>';
		return;
	}

	state.users.forEach(user => {
		const userTasks = state.tasks.filter(t => t.userId === user.id);

		const block = document.createElement("div");
		block.className = "user-block";

		block.innerHTML = `
			<div class="user-header">
				<h3>${escapeHtml(user.name)}</h3>
				<button class="danger" data-action="delete-user" data-id="${user.id}">Remove member</button>
			</div>
			<ul class="task-list">
				${userTasks.map(t => `
					<li>
						<span>${escapeHtml(t.text)}</span>
						<span>
							<button class="complete" data-action="complete-task" data-id="${t.id}">Done</button>
							<button class="danger" data-action="delete-task" data-id="${t.id}">Delete</button>
						</span>
					</li>
				`).join("") || '<li class="muted">No tasks assigned</li>'}
			</ul>
			<form class="inline" data-action="add-task" data-user-id="${user.id}">
				<input type="text" placeholder="New task" required>
				<button type="submit">Assign</button>
			</form>
		`;

		container.appendChild(block);
	});
}

function escapeHtml(str) {
	const div = document.createElement("div");
	div.textContent = str;
	return div.innerHTML;
}

document.getElementById("add-user-form").addEventListener("submit", async (e) => {
	e.preventDefault();
	const input = document.getElementById("new-user-name");
	const name = input.value.trim();
	if (!name) return;
	await api("/api/users", { method: "POST", body: JSON.stringify({ name }) });
	input.value = "";
	loadState();
});

document.getElementById("users-container").addEventListener("click", async (e) => {
	const btn = e.target.closest("button[data-action]");
	if (!btn) return;
	const { action, id } = btn.dataset;

	if (action === "delete-user") {
		if (!confirm("Remove this member and all their tasks?")) return;
		await api(`/api/users/${id}`, { method: "DELETE" });
	}
	if (action === "complete-task") {
		await api(`/api/tasks/${id}/complete`, { method: "POST" });
	}
	if (action === "delete-task") {
		await api(`/api/tasks/${id}`, { method: "DELETE" });
	}
	loadState();
});

document.getElementById("users-container").addEventListener("submit", async (e) => {
	const form = e.target.closest("form[data-action=add-task]");
	if (!form) return;
	e.preventDefault();
	const input = form.querySelector("input[type=text]");
	const text = input.value.trim();
	if (!text) return;
	await api("/api/tasks", {
		method: "POST",
		body: JSON.stringify({ userId: form.dataset.userId, text })
	});
	loadState();
});

loadState();
</script>

</body>
</html>
